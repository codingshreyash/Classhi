AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Classhi - Prediction market platform for CS 1660

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 15
    MemorySize: 256

Parameters:
  AdminUserIds:
    Type: String
    Default: ""
    Description: "Comma-separated Cognito sub UUIDs for admin users (per D-21)"

Resources:

  # ─── Cognito ────────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      MfaConfiguration: "OFF"
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      CallbackURLs:
        - "https://localhost:5173"
      SupportedIdentityProviders:
        - COGNITO

  # ─── DynamoDB Tables ─────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  MarketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: marketId
          AttributeType: S
      KeySchema:
        - AttributeName: marketId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  PositionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: marketId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: marketId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: byMarket
          KeySchema:
            - AttributeName: marketId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: subscribedMarketId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: byMarket
          KeySchema:
            - AttributeName: subscribedMarketId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── API Gateway: HTTP API ───────────────────────────────────────────────────

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "Authorization"
          - "Content-Type"
        AllowMethods:
          - "GET"
          - "POST"
          - "OPTIONS"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              Audience:
                - !Ref UserPoolClient

  # ─── API Gateway: WebSocket API ──────────────────────────────────────────────

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-websocket"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  WsAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref WebSocketApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsAuthorizerFunction.Arn}/invocations"
      IdentitySource:
        - "route.request.querystring.token"
      Name: WsJwtAuthorizer

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations"

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations"

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$connect"
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref WsAuthorizer
      Target: !Sub "integrations/${WsConnectIntegration}"

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$disconnect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsDisconnectIntegration}"

  WsAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsAuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  # ─── Lambda Functions ────────────────────────────────────────────────────────

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/health/
      Handler: handler.handler
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          MARKETS_TABLE: !Ref MarketsTable
          POSITIONS_TABLE: !Ref PositionsTable
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          ADMIN_USER_IDS: !Ref AdminUserIds
      Events:
        HealthCheck:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET
            ApiId: !Ref HttpApi
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  BroadcastHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/ws-broadcast/
      Handler: handler.handler
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          WEBSOCKET_API_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: "execute-api:ManageConnections"
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        # CRITICAL: StartingPosition TRIM_HORIZON is immutable after first deploy (P1)
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt MarketsTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BisectBatchOnFunctionError: true
            FunctionResponseTypes:
              - ReportBatchItemFailures
            BatchSize: 10
            MaximumRetryAttempts: 3
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/post-confirmation/
      Handler: handler.handler
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        CognitoTrigger:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/get-me/
      Handler: handler.handler
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          ADMIN_USER_IDS: !Ref AdminUserIds
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        GetMe:
          Type: HttpApi
          Properties:
            Path: /me
            Method: GET
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  ListMarketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/list-markets/
      Handler: handler.handler
      Environment:
        Variables:
          MARKETS_TABLE: !Ref MarketsTable
          ADMIN_USER_IDS: !Ref AdminUserIds
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MarketsTable
      Events:
        ListMarkets:
          Type: HttpApi
          Properties:
            Path: /markets
            Method: GET
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  GetMarketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/get-market/
      Handler: handler.handler
      Environment:
        Variables:
          MARKETS_TABLE: !Ref MarketsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MarketsTable
      Events:
        GetMarket:
          Type: HttpApi
          Properties:
            Path: /markets/{marketId}
            Method: GET
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  CreateMarketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/create-market/
      Handler: handler.handler
      Environment:
        Variables:
          MARKETS_TABLE: !Ref MarketsTable
          ADMIN_USER_IDS: !Ref AdminUserIds
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MarketsTable
      Events:
        CreateMarket:
          Type: HttpApi
          Properties:
            Path: /markets
            Method: POST
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  PlaceBetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/place-bet/
      Handler: handler.handler
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          MARKETS_TABLE: !Ref MarketsTable
          POSITIONS_TABLE: !Ref PositionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MarketsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PositionsTable
      Events:
        PlaceBet:
          Type: HttpApi
          Properties:
            Path: /markets/{marketId}/bets
            Method: POST
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  GetPositionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/get-positions/
      Handler: handler.handler
      Environment:
        Variables:
          POSITIONS_TABLE: !Ref PositionsTable
          MARKETS_TABLE: !Ref MarketsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PositionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref MarketsTable
      Events:
        GetPositions:
          Type: HttpApi
          Properties:
            Path: /me/positions
            Method: GET
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  ResolveMarketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/resolve-market/
      Handler: handler.handler
      Timeout: 30
      Environment:
        Variables:
          MARKETS_TABLE: !Ref MarketsTable
          POSITIONS_TABLE: !Ref PositionsTable
          USERS_TABLE: !Ref UsersTable
          ADMIN_USER_IDS: !Ref AdminUserIds
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MarketsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PositionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        ResolveMarket:
          Type: HttpApi
          Properties:
            Path: /markets/{marketId}/resolve
            Method: POST
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  WsAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/ws-authorizer/
      Handler: handler.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/ws-connect/
      Handler: handler.handler
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/handlers/ws-disconnect/
      Handler: handler.handler
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"

  # ─── EventBridge Scheduler IAM Role ─────────────────────────────────────────

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SchedulerBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "logs:CreateLogGroup"
                Resource: "*"

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
    Description: HTTP API endpoint URL
  WebSocketApiUrl:
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Description: WebSocket API endpoint URL
  UserPoolId:
    Value: !Ref UserPool
    Description: Cognito User Pool ID
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: Cognito User Pool Client ID
  UsersTableName:
    Value: !Ref UsersTable
    Description: DynamoDB Users table name
  MarketsTableName:
    Value: !Ref MarketsTable
    Description: DynamoDB Markets table name
  PositionsTableName:
    Value: !Ref PositionsTable
    Description: DynamoDB Positions table name
  ConnectionsTableName:
    Value: !Ref ConnectionsTable
    Description: DynamoDB Connections table name
  HealthCheckFunctionName:
    Value: !Ref HealthCheckFunction
    Description: Health check Lambda function name
